                      - generic [ref=e2330]:
                        - generic [ref=e2332]:
                          - text: Quiero compartir con todos esta experiencia ya que puede ayudar a mucha gente que se esté planteando si comprarla o no.
                          - text: Hace casi dos años empecé a tener insomnio, al principio como es algo nuevo no entiendes que le está pasando a tu cuerpo, por que te está ocurriendo esto. El caso es que desde que empezó hasta ahora, había probado de todo, remedios naturales y finalmente al no solucionar el problema me recetaron antidepresivos que si que me solucionaron el problema pero solo por unos meses. Después los deje y seguí padeciendo insomnio severo hasta tal punto de tener muchísima ansiedad, sudores nocturnos etc. No se por que un día me acordé de este maravilloso adaptógeno que es la ashwagandha y sabiendo de antemano los beneficios que tenia decidí probar porque el médico me había vuelto a recetar otros antidepresivos concretamente para la ansiedad.
                          - text: Cansada de las pastillas decidí comprarlo y me ha cambiado la vida. En menos de tres semanas mi ansiedad ha desaparecido. Mis sudores nocturnos también, tengo más energía y psicológicamente llevaba dos años sin estar tan feliz no sólo gracias a la ashwagandha, obvio que ha sido por empezar a reducir la ansiedad, el cortisol y empezar a dormir de nuevo, pero ha sido de gran ayuda. A veces también utilizo un poco de melatonina pero ya nada de pastillas, todo natural.
                          - text: "Así que a todos y cada uno de los que estéis pasando un mal momento de este estilo:"
                          - text: deporte, mente positiva siempre, bisglcicinato de magnesio, ashwagandha, vitamina d y a por ello. SI SE PUEDE!
